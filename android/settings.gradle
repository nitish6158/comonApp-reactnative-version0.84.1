pluginManagement { includeBuild("../node_modules/@react-native/gradle-plugin") }
plugins { id("com.facebook.react.settings") }
extensions.configure(com.facebook.react.ReactSettingsExtension){ ex -> ex.autolinkLibrariesFromCommand() }

dependencyResolutionManagement {
    repositories {
        google()
        mavenCentral()
        maven { url("$rootDir/../node_modules/@react-native-async-storage/async-storage/android/local_repo") }
    }
}

rootProject.name = 'commonapp'
include ':app'
includeBuild('../node_modules/@react-native/gradle-plugin')

include ':react-native-video'
project(':react-native-video').projectDir = new File(rootProject.projectDir, '../node_modules/react-native-video/android')

include ':react-native-branch'
project(':react-native-branch').projectDir = new File(rootProject.projectDir, '../node_modules/react-native-branch/android')

include ':uilib-native'
project(':uilib-native').projectDir = new File(rootProject.projectDir, '../node_modules/uilib-native/android')
